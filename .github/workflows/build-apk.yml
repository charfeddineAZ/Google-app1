name: Build with Gradle

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      # 3. (اختياري) عرض معلومات عن الملف للتأكد من سلامته
      - name: Check wrapper file
        run: |
          file gradle/wrapper/gradle-wrapper.jar
          

      # 4. إعداد Java (اختر الإصدار المناسب لمشروعك)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 5. منح صلاحية التنفيذ لـ gradlew (ضروري لأنظمة Linux)
      - name: Make gradlew executable
        run: chmod +x gradlew

      # 6. تنفيذ البناء (استخدم build أو أي مهمة أخرى)
      - name: Build with Gradle
        run: ./gradlew build 

      # 7. (اختياري) رفع مخرجات البناء كـ artifacts
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-outputs
          path: build/libs/
