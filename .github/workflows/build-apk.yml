name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:  # يتيح لك تشغيل البناء يدوياً من واجهة GitHub

jobs:
  build:
    runs-on: ubuntu-latest  # يستخدم Node 24 كافتراضي في أحدث الإصدارات

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'  # غيّر إلى 11 أو 21 حسب مشروعك

      # هذا الإجراء هو الحل السحري:
      # - يتحقق من صحة gradle-wrapper.jar (يحل مشكلتك السابقة).
      # - يحمّل Gradle تلقائياً.
      # - متوافق مع Node 24.
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # بناء APK وضع التصحيح (Debug)
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # (اختياري) بناء APK وضع الإصدار (Release) - يحتاج توقيع بالمفاتيح
      # - name: Build Release APK
      #   run: ./gradlew assembleRelease
      #   env:
      #     SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      #     SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      #     SIGNING_STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}

      # رفع ملف APK الناتج كـ Artifact لتستطيع تحميله
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          # لو بنيت Release غيّر المسار إلى:
          # path: app/build/outputs/apk/release/*.apk
