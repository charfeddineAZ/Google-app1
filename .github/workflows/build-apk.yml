name: Build Android APK (Node 20 - Temporary)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

# 🔑 المفتاح السحري: هذا المتغير البيئي يُجبر GitHub Actions على استخدام Node 20
# بدلاً من Node 24، رغم أن Node 20 مهمل (استخدام مؤقت فقط).
env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # هذا الإجراء سيعمل ضمن بيئة Node 20 بفضل المتغير المحدد أعلاه
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # بناء APK Debug
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # (اختياري) بناء Release - علّق عليه إن لم تكن بحاجته
      # - name: Build Release APK
      #   run: ./gradlew assembleRelease

      # رفع الملف الناتج
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
